name: generate plantuml
on: push

permissions:
  contents: write

jobs:
  generate_plantuml:
    runs-on: ubuntu-latest
    name: plantuml
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: 安裝 PlantUML
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml graphviz

      - name: 產生 SVG
        run: python3 .github/scripts/render_plantuml.py example

      - name: commit 產出
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "沒有變更,略過 commit"
          else
            git commit -m "Render PlantUML files"
            git push
          fi
