name: generate plantuml
on: push
jobs:
  generate_plantuml:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: 安裝 PlantUML
      run: |
        sudo apt-get update
        sudo apt-get install -y plantuml graphviz

    - name: 渲染 SVG
      run: plantuml -tsvg "example/**.puml"

    - name: commit 產出
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git diff --staged --quiet || git commit -m "Render PlantUML files"
        git push
